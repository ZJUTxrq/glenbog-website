{% extends 'base.html' %}

{% block title %}Species Map{% endblock %}

{% block content %}
<style>
  .card { width: min(100%, 1100px) !important; }
  main { align-items: flex-start !important; }
  #map { width: 100%; height: 520px; border-radius: 1rem; margin-top: 0.75rem; z-index: 0; }
  .legend { margin-top: 1rem; display: flex; gap: 1rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #475569; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; background: #dc2626; border: 2px solid white; box-shadow: 0 0 0 2px #dc2626; }
  .legend-boundary { width: 22px; height: 4px; background: #16a34a; border-radius: 2px; }
</style>

<div style="margin-bottom: 0.75rem;">
  <h2 style="margin: 0;">At-Risk Species Map</h2>
  <p style="margin: 0.4rem 0 0; color: #64748b; font-size: 0.9rem;">Locations of at-risk species records</p>
</div>

<div id="map"></div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot"></div>
    At-Risk Species Location
  </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([-36.56, 149.42], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18,
  }).addTo(map);

  const markerIcon = L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;background:#dc2626;border:2px solid white;border-radius:50%;box-shadow:0 0 0 2px #dc2626;"></div>',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });

  const species = [
    {% for s in species %}
    {
      lat: {{ s.latitude }},
      lng: {{ s.longitude }},
      scientific: {{ s.scientific_name | tojson }},
      common: {{ s.common_name | tojson }},
      observations: {{ s.num_observations }},
      date: {{ (s.date_of_observation.strftime('%Y-%m-%d') if s.date_of_observation else '—') | tojson }},
      status: {{ s.status | tojson }},
    },
    {% endfor %}
  ];

  fetch('/api/boundary')
    .then(r => r.json())
    .then(boundary => {
      if (boundary.length > 0) {
        L.polygon(boundary, {
          color: '#16a34a', weight: 2,
          fillColor: '#16a34a', fillOpacity: 0.08,
        }).addTo(map).bindPopup('Boundary');
      }
    });

  species.forEach(s => {
    L.marker([s.lat, s.lng], { icon: markerIcon })
      .addTo(map)
      .bindPopup(`
        <strong style="font-style:italic">${s.scientific}</strong><br>
        <span style="color:#475569">${s.common}</span><br>
        <hr style="margin:6px 0;border-color:#e2e8f0">
        <b>Observations:</b> ${s.observations}<br>
        <b>Date:</b> ${s.date}<br>
        <b>Status:</b> <span style="color:#b91c1c">${s.status}</span>
      `);
  });
</script>
{% endblock %}
