<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Glenbog{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef2ff;
        color: #0f172a;
      }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: linear-gradient(180deg, #eef2ff 0%, #ffffff 80%); }
      a { color: #2563eb; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .page { display: flex; flex-direction: column; min-height: 100vh; }
      header { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.5rem; background: white; box-shadow: 0 10px 30px rgba(15,23,42,0.08); }
      .brand { font-weight: 700; font-size: 1.15rem; letter-spacing: -.03em; display: flex; align-items: center; gap: 0.8rem; }
      .brand-btn { background: #2563eb; color: white; padding: 0.6rem 1rem; border-radius: 0.7rem; font-size: 0.9rem; border: none; cursor: pointer; font-weight: 600; transition: background 0.15s ease; }
      .brand-btn:hover { background: #1d4ed8; }
      nav { display: flex; align-items: center; gap: 1rem; }
      nav a.button { background: #2563eb; color: white; padding: 0.7rem 1.2rem; border-radius: 999px; border: none; font-weight: 600; }
      main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem 1rem; }
      .card { width: min(100%, 520px); background: white; border-radius: 28px; box-shadow: 0 30px 60px rgba(15,23,42,0.12); padding: 2.2rem; }
      .hero { margin-bottom: 1.5rem; }
      .hero h1 { margin: 0 0 0.75rem; font-size: clamp(2rem, 4vw, 2.75rem); line-height: 1.05; }
      .hero p { margin: 0; color: #475569; font-size: 1rem; }
      .form-group { margin-bottom: 1rem; }
      label { display: block; font-size: 0.95rem; margin-bottom: 0.5rem; color: #334155; }
      input { width: 100%; padding: 0.95rem 1rem; border: 1px solid #cbd5e1; border-radius: 0.95rem; background: #f8fafc; font-size: 1rem; }
      input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37,99,235,0.12); }
      button { width: 100%; padding: 0.95rem 1rem; border: none; border-radius: 999px; background: #2563eb; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.15s ease, background 0.15s ease; }
      button:hover { background: #1d4ed8; transform: translateY(-1px); }
      .small-link { display: block; margin-top: 1rem; color: #475569; }
      .alert { margin-bottom: 1.25rem; padding: 1rem 1.25rem; background: #e0f2fe; color: #075985; border: 1px solid #bae6fd; border-radius: 1rem; }
      footer { text-align: center; padding: 1rem 1.5rem; color: #64748b; font-size: 0.95rem; }
      .row { display: flex; gap: 0.8rem; flex-wrap: wrap; }
      .row a { color: #475569; }
      @media (max-width: 520px) {
        header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="brand">
          Glenbog
        </div>
        <nav>
          <a href="{{ url_for('main.index') }}">Home</a>
          {% if current_user.is_authenticated %}
            <a href="{{ url_for('main.logout') }}" class="button">Logout</a>
          {% else %}
            <a href="{{ url_for('main.login') }}">Login</a>
            <a href="{{ url_for('main.register') }}" class="button">Register</a>
          {% endif %}
        </nav>
      </header>
      <main>
        <div class="card">
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              <div class="alert">
                {% for message in messages %}
                  <div>{{ message }}</div>
                {% endfor %}
              </div>
            {% endif %}
          {% endwith %}

          {% block content %}{% endblock %}
        </div>
      </main>
      <footer>
        Glenbog Flask Demo
      </footer>
    </div>
  </body>
</html>
