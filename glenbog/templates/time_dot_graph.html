{% extends 'base.html' %}

{% block title %}Time Dot Graph{% endblock %}

{% block content %}
<style>
  .card { width: min(100%, 1100px) !important; }
  main { align-items: flex-start !important; }
  #chart-wrap { display: flex; gap: 1.2rem; align-items: flex-start; margin-top: 0.75rem; }
  #chart-container { flex: 1; min-width: 0; }
  #species-legend { flex-shrink: 0; width: 200px; display: flex; flex-direction: column; gap: 0.35rem; padding-top: 6px; }
  .legend-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; color: #334155; line-height: 1.3; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>

<div style="margin-bottom: 0.75rem;">
  <h2 style="margin: 0;">Time Dot Graph</h2>
  <p style="margin: 0.4rem 0 0; color: #64748b; font-size: 0.9rem;">Long-term species observation records over time</p>
</div>

<div id="chart-wrap">
  <div id="chart-container">
    <canvas id="timeDotChart"></canvas>
  </div>
  <div id="species-legend"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
  const observations = [
    {% for o in observations %}
    {
      x: {{ o.event_date.strftime('%Y-%m-%d') | tojson }},
      y: {{ o.vernacular_name | tojson }},
      scientific: {{ o.scientific_name | tojson }},
    },
    {% endfor %}
  ];

  const speciesList = [...new Set(observations.map(o => o.y))];

  // Build one dataset per species (for lines connecting same species)
  const colors = [
    '#2563eb','#16a34a','#dc2626','#d97706','#7c3aed',
    '#0891b2','#be185d','#65a30d','#ea580c','#6366f1',
    '#14b8a6','#f59e0b','#ef4444','#8b5cf6','#10b981',
  ];

  const datasets = speciesList.map((species, i) => {
    const pts = observations
      .filter(o => o.y === species)
      .map(o => ({ x: o.x, y: i, vernacular: o.y, scientific: o.scientific }));
    const color = colors[i % colors.length];
    return {
      label: species,
      data: pts,
      backgroundColor: color,
      borderColor: color,
      borderWidth: 1.5,
      pointRadius: 5,
      pointHoverRadius: 7,
      showLine: true,
      tension: 0,
    };
  });

  const legend = document.getElementById('species-legend');
  [...speciesList].reverse().forEach((name, i) => {
    const i_orig = speciesList.length - 1 - i;
    const row = document.createElement('div');
    row.className = 'legend-row';
    row.innerHTML = `<div class="legend-swatch" style="background:${colors[i_orig % colors.length]}"></div><span>${name}</span>`;
    legend.appendChild(row);
  });

  const ctx = document.getElementById('timeDotChart').getContext('2d');
  const chartHeight = Math.max(180, speciesList.length * 15);
  document.getElementById('timeDotChart').style.height = chartHeight + 'px';

  new Chart(ctx, {
    type: 'scatter',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const d = ctx.raw;
              return [`${d.vernacular} (${d.scientific})`, `Date: ${d.x}`];
            }
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'year', displayFormats: { year: 'yyyy' } },
          title: { display: true, text: 'Year' },
          grid: { color: '#f1f5f9' },
        },
        y: {
          type: 'linear',
          min: -0.5,
          max: speciesList.length - 0.5,
          ticks: {
            stepSize: 1,
            callback: val => speciesList[val] || '',
            font: { size: 11 },
          },
          grid: { color: '#f1f5f9' },
        }
      }
    }
  });
</script>
{% endblock %}
