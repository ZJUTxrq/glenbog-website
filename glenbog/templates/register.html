{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
  <div class="hero">
    <h1>Create Account</h1>
    <p>Register to access all features.</p>
  </div>
  <form method="post">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="example@domain.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" name="password2" placeholder="Re-enter your password" required>
    </div>
    <div class="form-group">
      <label>Registration Code</label>
      <input type="password" name="reg_code" placeholder="Enter registration code" required>
    </div>
    <button type="submit">Register</button>
  </form>
  <p class="small-link">Already have an account? <a href="{{ url_for('main.login') }}">Login</a></p>
{% endblock %}
