{% extends 'base.html' %}

{% block title %}Activism Tool{% endblock %}

{% block content %}
<style>
  .card { width: min(100%, 1100px) !important; }
  main { align-items: flex-start !important; }
  .home-layout { display: flex; gap: 1.5rem; }
  .sidebar { width: 180px; flex-shrink: 0; }
  .sidebar h3 { font-size: 0.85rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 0.75rem; }
  .sidebar-menu { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.25rem; }
  .sidebar-menu a { display: block; padding: 0.55rem 0.85rem; border-radius: 0.6rem; color: #334155; font-size: 0.9rem; text-decoration: none; transition: background 0.12s; }
  .sidebar-menu a:hover { background: #eff6ff; color: #2563eb; }
  .home-content { flex: 1; min-width: 0; }

  .hero-banner { position: relative; border-radius: 1.2rem; overflow: hidden; margin-bottom: 1.5rem; }
  .hero-banner img { width: 100%; max-height: 320px; object-fit: cover; display: block; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(15,23,42,0.15), rgba(15,23,42,0.55)); display: flex; flex-direction: column; justify-content: flex-end; padding: 1.8rem; }
  .hero-overlay h1 { margin: 0 0 0.4rem; color: white; font-size: clamp(1.6rem, 3vw, 2.4rem); text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .hero-overlay p { margin: 0; color: rgba(255,255,255,0.85); font-size: 1rem; }

  .quick-links { display: flex; gap: 1rem; }
  .quick-card { flex: 1; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1.2rem 1.4rem; text-decoration: none; color: #0f172a; transition: box-shadow 0.15s, transform 0.15s; display: flex; align-items: center; gap: 1rem; }
  .quick-card:hover { box-shadow: 0 8px 24px rgba(37,99,235,0.12); transform: translateY(-2px); text-decoration: none; }
  .quick-icon { width: 42px; height: 42px; border-radius: 0.75rem; background: #dbeafe; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
  .quick-card h4 { margin: 0 0 0.2rem; font-size: 0.95rem; font-weight: 600; }
  .quick-card p { margin: 0; font-size: 0.82rem; color: #64748b; }
</style>

<div class="home-layout">
  <aside class="sidebar">
    <h3>Navigation</h3>
    <ul class="sidebar-menu">
      <li><a href="{{ url_for('main.species_list') }}">Total Species</a></li>
      <li><a href="{{ url_for('main.key_species') }}">Key Species</a></li>
      <li><a href="{{ url_for('main.at_risk_species') }}">At-Risk Species</a></li>
      <li><a href="{{ url_for('main.species_map') }}">At-Risk Species Map</a></li>
      <li><a href="{{ url_for('main.time_dot_graph') }}">Time Dot Graph</a></li>
      <li><a href="{{ url_for('main.survey_map') }}">Survey Maps</a></li>
      <li><a href="{{ url_for('main.species_stats') }}">Species Summary</a></li>
      <li><a href="{{ url_for('main.order_summary') }}">Order Summary</a></li>
    </ul>
  </aside>

  <div class="home-content">
    <div class="hero-banner">
      <img src="{{ url_for('static', filename='glenbog.png') }}" alt="Activism Tool">
      <div class="hero-overlay">
        <h1>Activism Tool</h1>
      </div>
    </div>

  </div>
</div>
{% endblock %}
