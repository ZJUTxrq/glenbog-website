version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: glenbog_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: glenbog
      MYSQL_USER: glenbog
      MYSQL_PASSWORD: glenbog
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: glenbog_flask_app
    ports:
      - "3000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://glenbog:glenbog@db:3306/glenbog
      FLASK_ENV: development
      DATA_DIR: /data
    depends_on:
      - db
    volumes:
      - .:/app
      - ../data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 5

  selenium:
    image: selenium/standalone-chrome:4.25.0
    container_name: glenbog_selenium
    shm_size: 2gb
    ports:
      - "4444:4444"
      - "7900:7900"

  smoke:
    build: .
    profiles: ["test"]
    working_dir: /app
    environment:
      PYTHONPATH: /app
      BASE_URL: http://app:8000
      SELENIUM_REMOTE_URL: http://selenium:4444/wd/hub
      SMOKE_EMAIL: smoke@example.test
      SMOKE_PASSWORD: "123"
    depends_on:
      - app
      - selenium
    volumes:
      - .:/app
    command: ["pytest", "-q", "tests"]

volumes:
  db_data:
