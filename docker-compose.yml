version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: glenbog_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: glenbog
      MYSQL_USER: glenbog
      MYSQL_PASSWORD: glenbog
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: glenbog_flask_app
    ports:
      - "3000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://glenbog:glenbog@db:3306/glenbog
      FLASK_ENV: development
      DATA_DIR: /data
    depends_on:
      - db
    volumes:
      - .:/app
      - ../data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  db_data:
