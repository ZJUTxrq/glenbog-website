version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: glenbog_postgres_db
    restart: always
    environment:
      POSTGRES_DB: glenbog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: glenbog_flask_app
    ports:
      - "3000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/glenbog
      FLASK_ENV: development
    depends_on:
      - db
    volumes:
      - .:/app
      - ../data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  db_data:
